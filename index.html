<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School Forum</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #2b2d31;
  color: white;
  height: 100vh;
}

/* Layout */
#app {
  display: flex;
  height: 100vh;
}

/* Sidebar */
#sidebar {
  width: 230px;
  background: #1e1f22;
  padding: 12px;
  display: flex;
  flex-direction: column;
}

#forumList {
  flex: 1;
  overflow-y: auto;
}

.forumItem {
  padding: 8px;
  margin-bottom: 5px;
  background: #313338;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}

.forumItem:hover {
  background: #3a3d44;
}

/* Chat */
#chatArea {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.message {
  margin-bottom: 14px;
}

.username {
  font-weight: bold;
  font-size: 13px;
}

.text {
  font-size: 14px;
  margin-top: 3px;
}

.messageImage {
  max-width: 260px;
  border-radius: 6px;
  margin-top: 6px;
}

.controls {
  font-size: 11px;
  opacity: 0.6;
  cursor: pointer;
  display: flex; /* Make controls inline for edit/delete */
  gap: 10px; /* Space between controls */
}

.controls:hover {
  opacity: 1;
}

#inputArea {
  padding: 10px;
  background: #313338;
  display: flex;
  gap: 6px;
}

#messageInput {
  flex: 1;
  padding: 8px;
  border-radius: 5px;
  border: none;
  background: #383a40;
  color: white;
}

button {
  padding: 8px;
  border: none;
  border-radius: 5px;
  background: #5865f2;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #4752c4;
}

/* Auth */
#authContainer {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#authBox {
  background: #1e1f22;
  padding: 20px;
  border-radius: 8px;
  width: 280px;
}

input {
  width: 100%;
  margin-bottom: 8px;
  padding: 8px;
  border-radius: 5px;
  border: none;
  background: #383a40;
  color: white;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<!-- AUTH VIEW -->
<div id="authContainer">
  <div id="authBox">
    <h3>Login / Register</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <input id="username" placeholder="Username (new users only)">
    <button id="registerBtn">Register</button>
    <button id="loginBtn">Login</button>
  </div>
</div>

<!-- APP VIEW -->
<div id="app" class="hidden">
  <div id="sidebar">
    <h3>Forums</h3>
    <div id="forumList"></div>
    <button id="createForumBtn">+ New Forum</button>
    <hr>
    <div id="userDisplay"></div>
    <button id="logoutBtn">Logout</button>
  </div>

  <div id="chatArea">
    <div id="messages"></div>
    <div id="inputArea">
      <input id="messageInput" placeholder="Message...">
      <input type="file" id="imageInput">
      <button id="sendBtn">Send</button>
    </div>
  </div>
</div>
