<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School Forum</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #2b2d31;
  color: white;
  display: flex;
  height: 100vh;
}

/* Sidebar */
#sidebar {
  width: 230px;
  background: #1e1f22;
  padding: 12px;
  display: flex;
  flex-direction: column;
}

#forumList {
  flex: 1;
  overflow-y: auto;
}

.forumItem {
  padding: 8px;
  margin-bottom: 5px;
  background: #313338;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}

.forumItem:hover {
  background: #3a3d44;
}

/* Chat Area */
#chatArea {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.message {
  margin-bottom: 14px;
}

.username {
  font-weight: bold;
  font-size: 13px;
}

.text {
  font-size: 14px;
  margin-top: 3px;
}

.messageImage {
  max-width: 260px;
  border-radius: 6px;
  margin-top: 6px;
}

.controls {
  font-size: 11px;
  opacity: 0.6;
  cursor: pointer;
}

.controls:hover {
  opacity: 1;
}

/* Input */
#inputArea {
  padding: 10px;
  background: #313338;
  display: flex;
  gap: 6px;
}

#messageInput {
  flex: 1;
  padding: 8px;
  border-radius: 5px;
  border: none;
  background: #383a40;
  color: white;
}

button {
  padding: 8px;
  border: none;
  border-radius: 5px;
  background: #5865f2;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #4752c4;
}

/* Auth */
#authBox {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #1e1f22;
  padding: 20px;
  border-radius: 8px;
  width: 280px;
}

input {
  width: 100%;
  margin-bottom: 8px;
  padding: 8px;
  border-radius: 5px;
  border: none;
  background: #383a40;
  color: white;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div id="authBox">
  <h3>Login / Register</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <input id="username" placeholder="Username (new users only)">
  <button id="registerBtn">Register</button>
  <button id="loginBtn">Login</button>
</div>

<div id="sidebar" class="hidden">
  <h3>Forums</h3>
  <div id="forumList"></div>
  <button id="createForumBtn">+ New Forum</button>
  <hr>
  <div id="userDisplay"></div>
  <button id="logoutBtn">Logout</button>
</div>

<div id="chatArea" class="hidden">
  <div id="messages"></div>
  <div id="inputArea">
    <input id="messageInput" placeholder="Message...">
    <input type="file" id="imageInput">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getDatabase, ref, set, push, onValue, update, remove, off } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

/* YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAXk3WRhXoKvMFGSmoJ92V4YUnmNWIS0dY",
  authDomain: "schoolforum-dd574.firebaseapp.com",
  databaseURL: "https://schoolforum-dd574-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "schoolforum-dd574",
  storageBucket: "schoolforum-dd574.firebasestorage.app",
  messagingSenderId: "1013654532078",
  appId: "1:1013654532078:web:388c4e59d3524e8d6e28ff",
  measurementId: "G-9J9WPPK601"
};

const app = initializeApp(firebaseConfig);
getAnalytics(app);
const auth = getAuth(app);
const db = getDatabase(app);
const storage = getStorage(app);

/* DOM */
const authBox = document.getElementById("authBox");
const sidebar = document.getElementById("sidebar");
const chatArea = document.getElementById("chatArea");
const forumList = document.getElementById("forumList");
const messagesDiv = document.getElementById("messages");

let currentForum = null;
let currentUsername = null;
let messageRef = null;

/* AUTH */
document.getElementById("registerBtn").onclick = async () => {
  const userCred = await createUserWithEmailAndPassword(auth, email.value, password.value);
  await set(ref(db, "users/" + userCred.user.uid), {
    username: username.value
  });
};

document.getElementById("loginBtn").onclick =
  () => signInWithEmailAndPassword(auth, email.value, password.value);

document.getElementById("logoutBtn").onclick =
  () => signOut(auth);

onAuthStateChanged(auth, user => {
  if (user) {
    authBox.classList.add("hidden");
    sidebar.classList.remove("hidden");
    chatArea.classList.remove("hidden");

    onValue(ref(db, "users/" + user.uid), snap => {
      currentUsername = snap.val().username;
      document.getElementById("userDisplay").innerText =
        "Logged in as: " + currentUsername;
    }, { onlyOnce: true });

    loadForums();
  } else {
    authBox.classList.remove("hidden");
    sidebar.classList.add("hidden");
    chatArea.classList.add("hidden");
  }
});

/* FORUMS */
document.getElementById("createForumBtn").onclick = () => {
  const name = prompt("Forum name?");
  if (!name) return;
  push(ref(db, "forums"), { name });
};

function loadForums() {
  onValue(ref(db, "forums"), snapshot => {
    forumList.innerHTML = "";
    snapshot.forEach(child => {
      const div = document.createElement("div");
      div.className = "forumItem";
      div.innerText = "# " + child.val().name;
      div.onclick = () => selectForum(child.key);
      forumList.appendChild(div);
    });
  });
}

function selectForum(id) {
  currentForum = id;
  if (messageRef) off(messageRef);
  messageRef = ref(db, "messages/" + id);
  loadMessages();
}

/* MESSAGES */
function loadMessages() {
  onValue(messageRef, snapshot => {
    messagesDiv.innerHTML = "";
    snapshot.forEach(child => {
      const msg = child.val();
      const div = document.createElement("div");
      div.className = "message";

      div.innerHTML = `
        <div class="username">${msg.username}</div>
        <div class="text">${msg.text || ""}</div>
        ${msg.image ? `<img src="${msg.image}" class="messageImage">` : ""}
      `;

      if (msg.uid === auth.currentUser.uid) {
        const edit = document.createElement("div");
        edit.className = "controls";
        edit.innerText = "Edit";
        edit.onclick = () => {
          const newText = prompt("Edit message:", msg.text);
          if (newText !== null)
            update(ref(db, "messages/" + currentForum + "/" + child.key), {
              text: newText
            });
        };

        const del = document.createElement("div");
        del.className = "controls";
        del.innerText = "Delete";
        del.onclick = () =>
          remove(ref(db, "messages/" + currentForum + "/" + child.key));

        div.appendChild(edit);
        div.appendChild(del);
      }

      messagesDiv.appendChild(div);
    });
  });
}

document.getElementById("sendBtn").onclick = async () => {
  if (!currentForum) return alert("Select a forum first.");

  const text = messageInput.value.trim();
  const file = imageInput.files[0];

  if (!text && !file) return;

  const msgRef = push(ref(db, "messages/" + currentForum));
  let imageUrl = null;

  if (file) {
    const imageRef = sRef(storage, "images/" + msgRef.key);
    await uploadBytes(imageRef, file);
    imageUrl = await getDownloadURL(imageRef);
  }

  await set(msgRef, {
    text,
    image: imageUrl,
    username: currentUsername,
    uid: auth.currentUser.uid,
    timestamp: Date.now()
  });

  messageInput.value = "";
  imageInput.value = "";
};

</script>
</body>
</html>
